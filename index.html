<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio 3D - Smedoiu Andrei Marius</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg"></canvas>

    <!-- HUD Interface -->
    <div class="hud">
        <div class="info-panel">
            <h2 id="current-section">PORTFOLIO 3D</h2>
            <p id="info-text">Muoviti con il joystick per esplorare il mio portfolio</p>
            <div id="details"></div>
        </div>

        <!-- Joystick Mobile -->
        <div class="joystick-container" id="joystick"></div>

        <!-- Controls Info -->
        <div class="controls-info">
            <p><strong>Controlli:</strong></p>
            <p>🕹️ Joystick per muoverti</p>
            <p>⌨️ WASD per muoverti (PC)</p>
            <p>🖱️ Mouse per guardare</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.10/dist/nipplejs.js"></script>
    <script src="script.js"></script>
</body>
</html>
